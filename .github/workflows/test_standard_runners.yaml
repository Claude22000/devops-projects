name: Test GKE ARC Runner

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/github-runners'
      - main

jobs:
  test:
    runs-on: gke-docker-runners

    steps:
      - name: Check runner
        run: |
          echo "Running inside GKE ARC runner"
          uname -a
          docker version