name: Deploy ansible runners

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/github-runners'
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build :
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_IAM_ROLE }}
          aws-region: ${{ secrets.ECR_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.ECR_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_URI }}

      - name: Build Docker image
        run: |
          docker build -t github-runners:${{ github.sha }} -f github-runners/Dockerfile github-runners

      - name: Tag image
        run: |
          docker tag github-runners:${{ github.sha }} ${{ secrets.ECR_REPO_URI }}:${{ github.sha }}

      - name: Push image
        run: |
          docker push ${{ secrets.ECR_REPO_URI }}:${{ github.sha }}

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          # Add your test commands here, e.g., using pytest or another testing framework
          echo "Running tests..."

security_scan:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.ECR_IAM_ROLE }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_URI }}

    - name: Pull image
      run: |
        docker pull ${{ secrets.ECR_REPO_URI }}:${{ github.sha }}

    - name: Snyk scan
      uses: snyk/actions/docker@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        image: ${{ secrets.ECR_REPO_URI }}:${{ github.sha }}
        args: --severity-threshold=high

deploy:
   runs-on: ubuntu-latest
   needs: [build, security_scan, test]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_IAM_ROLE }}
          aws-region: ${{ secrets.ECR_REGION }}

      - name: Deploy to EKS
        run: |
          # Add your deployment commands here, e.g., using kubectl or helm
          echo "Deploying to EKS cluster..."