name: Deploy ansible runners

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/github-runners'
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::676005808259:role/github-runners-administration
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 676005808259.dkr.ecr.us-east-1.amazonaws.com/devops-training

      - name: Build Docker image
        run: |
          docker build -t github-runners ./github-runners/Dockerfile

      - name: Tag image
        run: |
          docker tag github-runners:latest 676005808259.dkr.ecr.us-east-1.amazonaws.com/devops-training/github-runners:latest

