name: Deploy AWS Ansible based runners

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build :
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PACKER_IAM_ROLE }}
          aws-region: us-east-1

      - name: Setup ansible
        run: |
          sudo apt-get update 
          sudo apt-get install -y ansible

      - name: Setup packer
        uses: hashicorp/setup-packer@v3.2.0

      - name: Build AMI with packer
        run: |
          cd github-runners-aws/github-runners-ansible-aws/packer
          packer init .
          packer validate github-runner.pkr.hcl
          packer build github-runner.pkr.hcl

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test runner
        run: |
          echo "Running inside GKE ARC runner"
          uname -a
          docker version

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_IAM_ROLE }}
          aws-region: ${{ secrets.ECR_REGION }}

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v1
      
      - name: Terraform deploy infra
        run: |
          cd github-runners-aws/github-runners-ansible-aws/terraform/environments/dev
          terraform init 
          terraform plan  -var="runner_count=5" -var="instance_type=t3.medium" 
          terraform apply -var="runner_count=5" -var="instance_type=t3.medium" --auto-approve
