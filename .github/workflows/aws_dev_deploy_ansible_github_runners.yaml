name: Deploy AWS ansible based runners

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/github-runners

permissions:
  id-token: write
  contents: read

jobs:
  build :
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_IAM_ROLE }}
          aws-region: ${{ secrets.ECR_REGION }}

      - name: Setup ansible
        run: |
          sudo apt-get update 
          sudo apt-get install -y ansible

      - name: Setup packer
        uses: hashicorp/setup-packer@v3.2.0

      - name: Build AMI with packer
        run: |
          cd github-runners-aws/github-runners-ansible-aws/terraform/environments/dev
          packer init .
          packer validate github-runner.pkr.hcl
          packer build github-runner.pkr.hcl

  deploy:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_IAM_ROLE }}
          aws-region: ${{ secrets.ECR_REGION }}

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v1
      
      - name: Terraform deploy infra
        run: 
          cd ../../github-runners-aws/github-runners-ansible-aws/terraform
          terraform init 
          terraform apply

      - name: Deploy to EKS
        run: |
          echo "Deploying to EKS cluster..."