name: Deploy GCP docker based runners

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/github-runners'
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build :
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build Docker image
        run: |
          docker build -t gcp-github-runners:${{ github.sha }} -f github-runners/Dockerfile github-runners

      - name: Tag image
        run: |
          docker tag gcp-github-runners:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT_ID }}/github-runners:${{ github.sha }}

      - name: Push image to artifact registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REGISTRY }}/:github-runners:${{ github.sha }}
