name: Deploy GCP docker based runners

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/github-runners'
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build :
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      
      - name: Login to Artifact Registry
        run: |
          gcloud auth configure-docker us-west2-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t us-west2-docker.pkg.dev/directed-sonar-474004-j3/github-runners/github-runners:${{ github.sha }} -f github-runners/Dockerfile github-runners


      - name: Push image to artifact registry
        run: |
          docker push us-west2-docker.pkg.dev/directed-sonar-474004-j3/github-runners/github-runners:${{ github.sha }}

  deploy :
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy with kubectl
        run: |
          kubectl apply -f k8s/