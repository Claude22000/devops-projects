name: Deploy GCP docker based runners

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build :
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
      
      - name: Docker auth to Google Artifact Registry
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://us-west2-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t us-west2-docker.pkg.dev/directed-sonar-474004-j3/gcp-images-repo/github-runners:${{ github.sha }} \
            -t us-west2-docker.pkg.dev/directed-sonar-474004-j3/gcp-images-repo/github-runners:latest \
            -f github-runners-aws/github-runners-standard/Dockerfile \
            github-runners

      - name: Push image to artifact registry
        run: |
          docker push us-west2-docker.pkg.dev/directed-sonar-474004-j3/gcp-images-repo/github-runners:${{ github.sha }}
          docker push us-west2-docker.pkg.dev/directed-sonar-474004-j3/gcp-images-repo/github-runners:latest

  deploy :
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy with Helm
        run: |
          helm upgrade --install github-runners ./k8s/helm/github-runners \
            -f k8s/helm/github-runners/github-runners-standard/values.yaml \
            --namespace github-runners-standard-dev \
            --create-namespace \
            --wait
